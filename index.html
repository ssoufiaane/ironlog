const e1rm  = (w,r) => r===1 ? w : Math.round(w*(1+r/30)*10)/10;

const maxW  = ex => Math.max(...ex.sets.map(s=>s.weight));

function getPR(sessions, name, excludeId=null) {
  return sessions.filter(s=>s.id!==excludeId).reduce((pr,s)=>{
    const ex = s.exercises.find(e=>e.name.toLowerCase()===name.toLowerCase());
    return ex?.sets?.length ? Math.max(pr,maxW(ex)) : pr;
  },0);
}

// Calcule le statut de fatigue de chaque muscle (rouge/jaune/vert)
function computeFatigue(sessions, customExercises={}) {
  const lastWorked = {}; // muscle → timestamp ms
  const now = Date.now();

  sessions.forEach(s => {
    const ts = new Date(s.date).getTime();
    s.exercises.forEach(ex => {
      const muscles = MUSCLE_MAP[ex.name] || customExercises[ex.name] || [];
      muscles.forEach(m => {
        if (!lastWorked[m] || ts > lastWorked[m]) lastWorked[m] = ts;
      });
    });
  });

  const status = {};
  Object.keys(MUSCLE_LABELS).forEach(m => {
    if (!lastWorked[m]) { status[m] = 'ok'; return; }
    const hoursAgo = (now - lastWorked[m]) / 3600000;
    if (hoursAgo < 48)      status[m] = 'fatigue';
    else if (hoursAgo < 72) status[m] = 'recup';
    else                    status[m] = 'ok';
  });

  return { status, lastWorked };
}

// ── SVG Charts ────────────────────────────────────────────────────────────────
function SVGLineChart({ data, dataKey, height=180 }) {
  if (!data || data.length < 2) return null;
  const W=320, H=height, PAD={top:10,right:10,bottom:28,left:36};
  const iW=W-PAD.left-PAD.right, iH=H-PAD.top-PAD.bottom;
  const vals=data.map(d=>d[dataKey]);
  const min=Math.min(...vals), max=Math.max(...vals), range=max-min||1;
  const sx=i=>PAD.left+(i/(data.length-1))*iW;
  const sy=v=>PAD.top+iH-((v-min)/range)*iH;
  const pathD=data.map((d,i)=>`${i===0?'M':'L'}${sx(i)},${sy(d[dataKey])}`).join(' ');
  const areaD=`${pathD} L${sx(data.length-1)},${PAD.top+iH} L${sx(0)},${PAD.top+iH} Z`;
  const yT=[min,min+range*0.5,max].map(v=>Math.round(v*10)/10);
  const step=Math.ceil(data.length/5);
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height,display:'block'}}>
      <defs>
        <linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#e8f94a" stopOpacity="0.18"/>
          <stop offset="100%" stopColor="#e8f94a" stopOpacity="0"/>
        </linearGradient>
      </defs>
      {yT.map((v,i)=>(
        <g key={i}>
          <line x1={PAD.left} y1={sy(v)} x2={W-PAD.right} y2={sy(v)} stroke="#1e1e1e" strokeWidth="1"/>
          <text x={PAD.left-4} y={sy(v)+4} textAnchor="end" fill="#444" fontSize="10" fontFamily="Barlow Condensed">{v}</text>
        </g>
      ))}
      {data.filter((_,i)=>i%step===0||i===data.length-1).map((d,_,__)=>{
        const i=data.indexOf(d);
        return <text key={i} x={sx(i)} y={H-6} textAnchor="middle" fill="#444" fontSize="10" fontFamily="Barlow Condensed">{d.date}</text>;
      })}
      <path d={areaD} fill="url(#lg)"/>
      <path d={pathD} fill="none" stroke="#e8f94a" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
      {data.map((d,i)=>(
        <circle key={i} cx={sx(i)} cy={sy(d[dataKey])} r="4" fill="#e8f94a"/>
      ))}
    </svg>
  );
}

function SVGBarChart({ data, dataKey, height=140 }) {
  if (!data || data.length < 1) return null;
  const W=320, H=height, PAD={top:10,right:10,bottom:28,left:36};
  const iW=W-PAD.left-PAD.right, iH=H-PAD.top-PAD.bottom;
  const vals=data.map(d=>d[dataKey]), max=Math.max(...vals)||1;
  const bW=Math.max(4,iW/data.length*0.6), gap=iW/data.length;
  const sy=v=>(v/max)*iH;
  const step=Math.ceil(data.length/5);
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height,display:'block'}}>
      <line x1={PAD.left} y1={PAD.top} x2={PAD.left} y2={PAD.top+iH} stroke="#1e1e1e" strokeWidth="1"/>
      <text x={PAD.left-4} y={PAD.top+4} textAnchor="end" fill="#444" fontSize="10" fontFamily="Barlow Condensed">{Math.round(max)}</text>
      <text x={PAD.left-4} y={PAD.top+iH+4} textAnchor="end" fill="#444" fontSize="10" fontFamily="Barlow Condensed">0</text>
      {data.map((d,i)=>{
        const bh=sy(d[dataKey]), x=PAD.left+gap*i+gap/2-bW/2, y=PAD.top+iH-bh;
        return (
          <g key={i}>
            <rect x={x} y={y} width={bW} height={bh} fill="#1a2000" stroke="#e8f94a" strokeWidth="1" rx="2"/>
            {(i%step===0||i===data.length-1)&&<text x={x+bW/2} y={H-6} textAnchor="middle" fill="#444" fontSize="10" fontFamily="Barlow Condensed">{d.date}</text>}
          </g>
        );
      })}
    </svg>
  );
}

  toastBx: { position:'fixed', bottom:90, left:'50%', transform:'translateX(-50%)', background:'#e8f94a', color:'#0a0a0a', padding:'10px 22px', borderRadius:30, fontSize:14, fontWeight:700, zIndex:999, whiteSpace:'nowrap' },
  nav:     { position:'fixed', bottom:0, left:'50%', transform:'translateX(-50%)', width:'100%', maxWidth:480, background:'#0f0f0f', borderTop:'1px solid #1e1e1e', display:'flex', justifyContent:'space-around', padding:'10px 0', paddingBottom:'calc(env(safe-area-inset-bottom,10px) + 4px)' },
};

function nbSt(a) {
  return { background:'transparent', border:'none', color:a?'#e8f94a':'#444', fontSize:11, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', cursor:'pointer', display:'flex', flexDirection:'column', alignItems:'center', gap:2, padding:'2px 8px' };
}

function NavBar({ current, setView }) {
  return (
    <div style={S.nav}>
      <button style={nbSt(current==='home')}    onClick={()=>setView('home')}   ><span style={{fontSize:18}}>🏠</span>Accueil</button>
      <button style={nbSt(current==='corps')}   onClick={()=>setView('corps')}  ><span style={{fontSize:18}}>💪</span>Corps</button>
      <button style={nbSt(current==='stats')}   onClick={()=>setView('stats')}  ><span style={{fontSize:18}}>📈</span>Stats</button>
      <button style={nbSt(current==='history')} onClick={()=>setView('history')}><span style={{fontSize:18}}>📋</span>Historique</button>
    </div>
  );
}

function SetForm({ exIdx, onAdd }) {
  const [w, setW] = useState('');
  const [r, setR] = useState('');
  const submit = () => { if (w && r) { onAdd(exIdx,w,r); setW(''); setR(''); } };
  return (
    <div style={{display:'flex',gap:8,padding:'12px 16px',borderTop:'1px solid #1a1a1a'}}>
      <input style={S.inp} type="number" placeholder="Kg" value={w} onChange={e=>setW(e.target.value)} inputMode="decimal"/>
      <input style={S.inp} type="number" placeholder="Reps" value={r} onChange={e=>setR(e.target.value)} inputMode="numeric"/>
      <button onClick={submit} style={{...S.btnG,color:'#e8f94a',borderColor:'#e8f94a',padding:'8px 16px',fontWeight:700,fontSize:18}}>+</button>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [sessions,   setSessions]   = useState([]);
  const [view,       setView]       = useState('home');
  const [cur,        setCur]        = useState(null);
  const [editId,     setEditId]     = useState(null);
  const [openEx,     setOpenEx]     = useState(null);
  const [exName,     setExName]     = useState('');
  const [showPicker, setShowPicker] = useState(false);
  const [ai,         setAi]         = useState({});
  const [loadAi,     setLoadAi]     = useState({});
  const [toast,      setToast]      = useState(null);
  const [selEx,      setSelEx]      = useState(null);
  const [metric,     setMetric]     = useState('maxWeight');
  const [confirmDel, setConfirmDel] = useState(null);
  const [newPRs,     setNewPRs]     = useState([]);
  const [bodyFace,   setBodyFace]   = useState('front');
  const [customExercises, setCustomExercises] = useState({}); // { name: [muscles] }
  const [muscleModal, setMuscleModal] = useState(null); // nom exercice en attente de muscles
  const [selectedMuscles, setSelectedMuscles] = useState([]);
  const inputRef = useRef(null);

  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) setSessions(JSON.parse(raw));
      else { setSessions(DEMO); localStorage.setItem(STORAGE_KEY,JSON.stringify(DEMO)); }
    } catch { setSessions(DEMO); }
    try {
      const rawCustom = localStorage.getItem(CUSTOM_EX_KEY);
      if (rawCustom) setCustomExercises(JSON.parse(rawCustom));
    } catch {}
  }, []);

  const save = updated => {
    setSessions(updated);
    try { localStorage.setItem(STORAGE_KEY,JSON.stringify(updated)); } catch {}
  };

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(null),2500); };

  const startSession = () => {
    setEditId(null);
    setCur({ id:Date.now(), date:new Date().toISOString().split('T')[0], exercises:[] });
    setOpenEx(null); setAi({}); setNewPRs([]);
    setView('session');
  };

  const editSession = s => {
    setEditId(s.id);
    setCur(JSON.parse(JSON.stringify(s)));
    setOpenEx(null); setAi({}); setNewPRs([]);
    setView('session');
  };

  const deleteSession = id => {
    save(sessions.filter(s=>s.id!==id));
    setConfirmDel(null);
    showToast('Séance supprimée');
  };

  const addExercise = (name, skipMuscleCheck=false) => {
    if (!name.trim()) return;
    const isPreset = PRESET_EXERCISES.includes(name.trim());
    const isKnownCustom = customExercises[name.trim()];
    // Si exercice inconnu → demander les muscles
    if (!isPreset && !isKnownCustom && !skipMuscleCheck) {
      setMuscleModal(name.trim());
      setSelectedMuscles([]);
      setShowPicker(false);
      return;
    }
    const updated = { ...cur, exercises:[...cur.exercises,{name:name.trim(),sets:[]}] };
    setCur(updated);
    setOpenEx(updated.exercises.length-1);
    setExName(''); setShowPicker(false); setMuscleModal(null);
  };

  const confirmCustomExercise = () => {
    if (!muscleModal) return;
    const updated = { ...customExercises, [muscleModal]: selectedMuscles };
    setCustomExercises(updated);
    try { localStorage.setItem(CUSTOM_EX_KEY, JSON.stringify(updated)); } catch {}
    addExercise(muscleModal, true);
  };

  const removeExercise = i => {
    setCur({ ...cur, exercises:cur.exercises.filter((_,j)=>j!==i) });
    setOpenEx(null);
  };

  const addSet = (exIdx,w,r) => {
    const exercises = cur.exercises.map((ex,i)=>{
      if (i!==exIdx) return ex;
      const pr = getPR(sessions,ex.name,editId);
      const weight = parseFloat(w);
      if (weight>pr && pr>0 && !newPRs.includes(ex.name)) setNewPRs(p=>[...p,ex.name]);
      return { ...ex, sets:[...ex.sets,{weight,reps:parseInt(r)}] };
    });
    setCur({ ...cur, exercises });
  };

  const removeSet = (exIdx,si) => {
    const exercises = cur.exercises.map((ex,i)=>
      i!==exIdx ? ex : { ...ex, sets:ex.sets.filter((_,j)=>j!==si) }
    );
    setCur({ ...cur, exercises });
  };

  const finishSession = () => {
    if (!cur.exercises.length) { showToast('Ajoute au moins un exercice !'); return; }
    const updated = editId ? sessions.map(s=>s.id===editId?cur:s) : [cur,...sessions];
    save(updated);
    setCur(null); setEditId(null); setOpenEx(null); setAi({}); setNewPRs([]);
    if (!editId && newPRs.length) showToast(`🏆 PR battu : ${newPRs.join(', ')} !`);
    else showToast(editId ? 'Séance modifiée ✓' : 'Séance sauvegardée 💪');
    setView('history');
  };

  const getLastSession = name => {
    for (const s of sessions) {
      if (s.id===editId) continue;
      const ex = s.exercises.find(e=>e.name.toLowerCase()===name.toLowerCase());
      if (ex?.sets?.length) return { session:s, ex };
    }
    return null;
  };

  const allExercises = [...new Set(sessions.flatMap(s=>s.exercises.map(e=>e.name)))];
  const allPRs = Object.fromEntries(allExercises.map(n=>[n,getPR(sessions,n)]));

  const buildChart = name => {
    return [...sessions].reverse().reduce((acc,s)=>{
      const ex = s.exercises.find(e=>e.name.toLowerCase()===name.toLowerCase());
      if (ex?.sets?.length) acc.push({ date:fmtD(s.date), maxWeight:maxW(ex), e1rm:maxE(ex), volume:vol(ex) });
      return acc;
    },[]);
  };

  const generatePDF = () => {
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const today = new Date();
      const weekStart = new Date(today);
      weekStart.setDate(today.getDate() - today.getDay() + 1);
      const weekEnd = new Date(weekStart);
      weekEnd.setDate(weekStart.getDate() + 6);

      const weekSessions = sessions.filter(s => {
        const d = new Date(s.date);
        return d >= weekStart && d <= weekEnd;
      });

      // Header
      doc.setFillColor(14, 14, 14);
      doc.rect(0, 0, 210, 30, 'F');
      doc.setTextColor(232, 249, 74);
      doc.setFontSize(22);
      doc.setFont('helvetica', 'bold');
      doc.text('IRONLOG — Workout de la semaine', 14, 18);

      doc.setTextColor(150, 150, 150);
      doc.setFontSize(11);
      doc.setFont('helvetica', 'normal');
      const dateRange = `${weekStart.toLocaleDateString('fr-FR')} → ${weekEnd.toLocaleDateString('fr-FR')}`;
      doc.text(dateRange, 14, 26);

      let y = 40;

      if (weekSessions.length === 0) {
        doc.setTextColor(100, 100, 100);
        doc.setFontSize(13);
        doc.text('Aucune séance cette semaine.', 14, y);
      } else {
        weekSessions.forEach((s, si) => {
          // Séance header
          doc.setFillColor(26, 26, 26);
          doc.rect(10, y - 5, 190, 12, 'F');
          doc.setTextColor(232, 249, 74);
          doc.setFontSize(13);
          doc.setFont('helvetica', 'bold');
          doc.text(`📅 ${fmtL(s.date)}`, 14, y + 3);
          y += 14;

          s.exercises.forEach(ex => {
            doc.setTextColor(200, 200, 200);
            doc.setFontSize(11);
            doc.setFont('helvetica', 'bold');
            doc.text(`• ${ex.name}`, 16, y);
            y += 7;

            ex.sets.forEach((set, si) => {
              doc.setTextColor(140, 140, 140);
              doc.setFontSize(10);
              doc.setFont('helvetica', 'normal');
              doc.text(`    Série ${si+1} : ${set.weight} kg × ${set.reps} reps`, 18, y);
              y += 6;
            });

            // Volume total
            const totalVol = vol(ex);
            doc.setTextColor(100, 180, 100);
            doc.setFontSize(9);
            doc.text(`    Volume total : ${totalVol} kg`, 18, y);
            y += 8;

            if (y > 270) { doc.addPage(); y = 20; }
          });
          y += 6;
        });

        // Résumé
        if (y > 240) { doc.addPage(); y = 20; }
        doc.setFillColor(14, 32, 0);
        doc.rect(10, y, 190, 20, 'F');
        doc.setTextColor(232, 249, 74);
        doc.setFontSize(11);
        doc.setFont('helvetica', 'bold');
        const totalSets = weekSessions.reduce((a,s)=>a+s.exercises.reduce((b,e)=>b+e.sets.length,0),0);
        const totalVolume = weekSessions.reduce((a,s)=>a+s.exercises.reduce((b,e)=>b+vol(e),0),0);
        doc.text(`Résumé : ${weekSessions.length} séances · ${totalSets} séries · ${totalVolume} kg de volume total`, 14, y + 13);
      }

      doc.save(`ironlog-semaine-${weekStart.toISOString().split('T')[0]}.pdf`);
      showToast('PDF téléchargé 📄');
    } catch(e) {
      showToast('Erreur PDF — réessaie');
    }
  };

  const getAI = async exIdx => {
    const ex = cur.exercises[exIdx];
    const last = getLastSession(ex.name);
    setLoadAi(p=>({...p,[exIdx]:true}));
    const prompt = `Coach muscu expert. Exercice: ${ex.name}.
${last?`Dernière séance (${fmtL(last.session.date)}): ${last.ex.sets.map(s=>`${s.weight}kg x ${s.reps}`).join(', ')}`:'Aucune donnée précédente.'}
${ex.sets.length?`Séries aujourd'hui: ${ex.sets.map(s=>`${s.weight}kg x ${s.reps}`).join(', ')}`:'Aucune série encore.'}
Conseil COURT max 3 lignes, poids+reps exacts, format "➜ [conseil]", motivant.`;
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{ 'Content-Type':'application/json', 'x-api-key':API_KEY, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
        body:JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:200, messages:[{role:'user',content:prompt}] })
      });
      const data = await res.json();
      setAi(p=>({...p,[exIdx]:data.content?.map(b=>b.text||'').join('')||'Erreur.'}));
    } catch {
      setAi(p=>({...p,[exIdx]:'Erreur connexion.'}));
    }
    setLoadAi(p=>({...p,[exIdx]:false}));
  };

  // ── CORPS (Fatigue Map) ────────────────────────────────────────────────────
  if (view==='corps') {
    const { status, lastWorked } = computeFatigue(sessions, customExercises);
    const statusLabels = { fatigue:'🔴 Fatigué', recup:'🟡 En récup', ok:'🟢 Récupéré' };
    const hoursAgo = m => lastWorked[m] ? Math.round((Date.now()-lastWorked[m])/3600000) : null;

    return (
      <div style={S.app}>
        <div style={S.hdr}>
          <div><div style={S.logo}>Mon Corps</div><div style={S.sub}>Carte de fatigue musculaire</div></div>
        </div>
        <div style={S.sec}>
          {/* Légende */}
          <div style={{display:'flex',gap:10,marginBottom:18,justifyContent:'center'}}>
            {[['🟢','Récupéré (72h+)'],['🟡','En récup (48-72h)'],['🔴','Fatigué (<48h)']].map(([ic,lb])=>(
              <div key={lb} style={{fontSize:11,color:'#888',display:'flex',alignItems:'center',gap:4}}>
                <span>{ic}</span><span>{lb}</span>
              </div>
            ))}
          </div>

          {/* Toggle avant/arrière */}
          <div style={{display:'flex',gap:8,marginBottom:20,justifyContent:'center'}}>
            {[['front','Vue avant'],['back','Vue arrière']].map(([f,l])=>(
              <button key={f} onClick={()=>setBodyFace(f)}
                style={{...S.btnG, color:bodyFace===f?'#e8f94a':'#555', borderColor:bodyFace===f?'#e8f94a':'#2a2a2a', padding:'8px 20px', fontWeight:700, fontSize:13, textTransform:'uppercase', letterSpacing:'0.08em'}}>
                {l}
              </button>
            ))}
          </div>

          {/* SVG Body */}
          <div style={{background:'#111',border:'1px solid #1e1e1e',borderRadius:8,padding:'16px',marginBottom:20}}>
            {bodyFace==='front'
              ? <BodyFront status={status}/>
              : <BodyBack  status={status}/>
            }
          </div>

          {/* Liste détaillée */}
          <div style={{fontSize:11,color:'#444',letterSpacing:'0.15em',textTransform:'uppercase',marginBottom:10}}>Détail par muscle</div>
          {Object.keys(MUSCLE_LABELS).map(m => {
            const st = status[m];
            const h = hoursAgo(m);
            const col = {fatigue:'#f94a4a',recup:'#f9c84a',ok:'#4af97a'}[st];
            return (
              <div key={m} style={{...S.card,display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px'}}>
                <div>
                  <div style={{fontSize:15,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em'}}>{MUSCLE_LABELS[m]}</div>
                  <div style={{fontSize:12,color:'#555',marginTop:2}}>
                    {h===null ? 'Jamais entraîné' : h < 1 ? 'Il y a moins d\'1h' : `Il y a ${h}h`}
                  </div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:13,fontWeight:700,color:col}}>{statusLabels[st]}</div>
                  {st==='fatigue' && <div style={{fontSize:11,color:'#555',marginTop:2}}>Repos conseillé</div>}
                  {st==='recup'   && <div style={{fontSize:11,color:'#555',marginTop:2}}>Légère charge ok</div>}
                  {st==='ok'      && <div style={{fontSize:11,color:'#555',marginTop:2}}>Prêt à bosser</div>}
                </div>
              </div>
            );
          })}

          {/* Suggestion du jour */}
          <div style={{background:'#0e1800',border:'1px solid #2a3a00',borderRadius:8,padding:'16px',marginTop:8,marginBottom:20}}>
            <div style={{fontSize:13,color:'#e8f94a',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:8}}>💡 Que faire aujourd'hui ?</div>
            <div style={{fontSize:14,color:'#c8e060',lineHeight:1.6}}>
              {(() => {
                const okMuscles = Object.keys(status).filter(m=>status[m]==='ok');
                const fatigued  = Object.keys(status).filter(m=>status[m]==='fatigue');
                if (fatigued.length === 0) return '✅ Tous tes muscles sont récupérés. Tu peux t\'entraîner librement aujourd\'hui !';
                const rec = okMuscles.map(m=>MUSCLE_LABELS[m]).slice(0,4).join(', ');
                const fat = fatigued.map(m=>MUSCLE_LABELS[m]).slice(0,3).join(', ');
                return `✅ Muscles OK : ${rec || 'aucun'}\n❌ À éviter : ${fat}`;
              })()}
            </div>
          </div>
        </div>
        {toast && <div style={S.toastBx}>{toast}</div>}
        <NavBar current="corps" setView={setView}/>
      </div>
    );
  }

  // ── SESSION ────────────────────────────────────────────────────────────────
  if (view==='session' && cur) {
    return (
      <div style={S.app}>
        <div style={{...S.hdr,justifyContent:'space-between'}}>
          <div>
            <div style={S.logo}>{editId?'Modifier':'Séance en cours'}</div>
            <div style={S.sub}>{fmtL(cur.date)}</div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>{setCur(null);setEditId(null);setView('history');}} style={{...S.btnG,padding:'8px 12px'}}>✕</button>
            <button onClick={finishSession} style={{background:'#e8f94a',border:'none',borderRadius:4,color:'#0a0a0a',fontFamily:'inherit',fontWeight:700,fontSize:13,padding:'8px 14px',cursor:'pointer',textTransform:'uppercase'}}>
              {editId?'SAUVER ✓':'TERMINER ✓'}
            </button>
          </div>
        </div>

        {newPRs.length > 0 && (
          <div style={{background:'#2a1500',borderBottom:'1px solid #ff8800',padding:'10px 20px',display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:20}}>🏆</span>
            <span style={{fontSize:14,fontWeight:700,color:'#ffaa00'}}>NOUVEAU PR : {newPRs.join(', ')}</span>
          </div>
        )}

        <div style={S.sec}>
          {cur.exercises.map((ex,exIdx)=>{
            const last = getLastSession(ex.name);
            const isOpen = openEx===exIdx;
            const exPR = getPR(sessions,ex.name,editId);
            const curMax = ex.sets.length ? maxW(ex) : 0;
            const hasPR = curMax>exPR && exPR>0;
            return (
              <div key={exIdx} style={{...S.card,borderColor:hasPR?'#ff8800':isOpen?'#2a3a00':'#1e1e1e'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',cursor:'pointer',borderBottom:'1px solid #1a1a1a'}}
                  onClick={()=>setOpenEx(isOpen?null:exIdx)}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <div style={{fontSize:18,fontWeight:700,letterSpacing:'0.05em',textTransform:'uppercase'}}>{ex.name}</div>
                    {hasPR && <span style={S.prTag}>🏆 PR</span>}
                  </div>
                  <div style={{display:'flex',gap:8,alignItems:'center'}}>
                    <span style={S.tag}>{ex.sets.length} série{ex.sets.length!==1?'s':''}</span>
                    <span style={{color:'#444',fontSize:18}}>{isOpen?'▲':'▼'}</span>
                  </div>
                </div>
                {isOpen && (
                  <>
                    {last && (
                      <div style={{margin:'4px 16px 10px',padding:'8px 12px',background:'#141414',border:'1px solid #1e1e1e',borderRadius:4,fontSize:13,color:'#666'}}>
                        <span style={{color:'#555',fontWeight:700,textTransform:'uppercase',fontSize:11,letterSpacing:'0.1em'}}>Dernière fois ({fmtL(last.session.date)}) : </span>
                        {last.ex.sets.map((s,i)=>(
                          <span key={i} style={{marginRight:6,color:'#888'}}>{s.weight}kg×{s.reps}{i<last.ex.sets.length-1?' ·':''}</span>
                        ))}
                      </div>
                    )}
                    {exPR > 0 && (
                      <div style={{margin:'0 16px 10px',padding:'6px 12px',background:'#1a1000',border:'1px solid #2a2000',borderRadius:4,fontSize:13}}>
                        <span style={{color:'#555',fontSize:11,textTransform:'uppercase',letterSpacing:'0.1em',fontWeight:700}}>PR actuel : </span>
                        <span style={{color:'#ffaa00',fontWeight:700}}>{exPR} kg</span>
                        {curMax>0 && curMax<exPR && <span style={{color:'#555',fontSize:12}}> — encore {Math.round((exPR-curMax)*10)/10} kg à battre</span>}
                      </div>
                    )}
                    {ex.sets.map((set,si)=>{
                      const isSetPR = exPR>0 && set.weight>exPR;
                      return (
                        <div key={si} style={{display:'flex',alignItems:'center',padding:'8px 16px',borderBottom:'1px solid #161616',gap:10}}>
                          <span style={{width:22,color:'#444',fontSize:12,fontWeight:700}}>{si+1}</span>
                          <span style={{flex:1,fontSize:16,fontWeight:600}}>{set.weight} kg × {set.reps} reps</span>
                          {isSetPR && <span style={S.prTag}>🏆 PR</span>}
                          <button onClick={()=>removeSet(exIdx,si)} style={{background:'none',border:'none',color:'#333',cursor:'pointer',fontSize:16,padding:'0 4px'}}>✕</button>
                        </div>
                      );
                    })}
                    <SetForm exIdx={exIdx} onAdd={addSet}/>
                    {ai[exIdx] && (
                      <div style={{margin:'0 16px 14px',padding:'10px 14px',background:'#0e1800',border:'1px solid #2a3a00',borderRadius:4,fontSize:14,lineHeight:1.5,color:'#c8e060',whiteSpace:'pre-wrap'}}>
                        {ai[exIdx]}
                      </div>
                    )}
                    <div style={{padding:'0 16px 14px',display:'flex',gap:8}}>
                      <button onClick={()=>getAI(exIdx)} disabled={loadAi[exIdx]}
                        style={{...S.btnG,flex:1,color:'#c8e060',borderColor:'#2a3a00',fontSize:13,padding:'9px 0'}}>
                        {loadAi[exIdx]?'⏳ Analyse...':'🤖 Conseil IA'}
                      </button>
                      <button onClick={()=>removeExercise(exIdx)}
                        style={{...S.btnG,color:'#f94a4a',borderColor:'#3a1a1a',padding:'9px 14px',fontSize:13}}>
                        Supprimer
                      </button>
                    </div>
                  </>
                )}
              </div>
            );
          })}

          {!showPicker && !muscleModal ? (
            <button style={S.btnO} onClick={()=>setShowPicker(true)}>+ Ajouter un exercice</button>
          ) : muscleModal ? (
            // ── Modal sélection muscles ──
            <div style={{...S.card,padding:16,borderColor:'#2a3a00'}}>
              <div style={{fontSize:14,color:'#e8f94a',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:4}}>
                💪 {muscleModal}
              </div>
              <div style={{fontSize:12,color:'#666',marginBottom:14}}>Quels muscles cet exercice cible ?</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:16}}>
                {Object.entries(MUSCLE_LABELS).map(([key,label])=>{
                  const selected = selectedMuscles.includes(key);
                  return (
                    <button key={key}
                      onClick={()=>setSelectedMuscles(prev=>selected?prev.filter(m=>m!==key):[...prev,key])}
                      style={{background:selected?'#1a2000':'#1a1a1a',color:selected?'#e8f94a':'#888',border:`1px solid ${selected?'#e8f94a':'#2a2a2a'}`,borderRadius:4,padding:'7px 12px',fontSize:13,cursor:'pointer',fontWeight:selected?700:400}}>
                      {label}
                    </button>
                  );
                })}
              </div>
              <div style={{display:'flex',gap:8}}>
                <button onClick={confirmCustomExercise}
                  style={{...S.btnG,flex:1,color:'#e8f94a',borderColor:'#e8f94a',padding:'10px 0',fontWeight:700,fontSize:14,textTransform:'uppercase'}}>
                  ✓ Confirmer
                </button>
                <button onClick={()=>{setMuscleModal(null);setShowPicker(true);}} style={S.btnG}>✕ Retour</button>
              </div>
            </div>
          ) : (
            <div style={{...S.card,padding:16}}>
              <div style={{fontSize:13,color:'#666',letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:12}}>Choisir un exercice</div>
              {/* Exercices custom sauvegardés */}
              {Object.keys(customExercises).length > 0 && (
                <>
                  <div style={{fontSize:11,color:'#e8f94a',letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:8}}>Mes exercices</div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:14}}>
                    {Object.keys(customExercises).map(n=>(
                      <button key={n} onClick={()=>addExercise(n,true)}
                        style={{background:'#1a2000',border:'1px solid #2a3a00',color:'#e8f94a',borderRadius:4,padding:'7px 12px',fontSize:13,cursor:'pointer',fontWeight:600}}>
                        ⭐ {n}
                      </button>
                    ))}
                  </div>
                  <div style={{fontSize:11,color:'#444',letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:8}}>Exercices prédéfinis</div>
                </>
              )}
              <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:14}}>
                {PRESET_EXERCISES.map(n=>(
                  <button key={n} onClick={()=>addExercise(n)}
                    style={{background:'#1a1a1a',border:'1px solid #2a2a2a',color:'#ccc',borderRadius:4,padding:'7px 12px',fontSize:13,cursor:'pointer'}}>
                    {n}
                  </button>
                ))}
              </div>
              <div style={{fontSize:11,color:'#555',letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:8}}>Nouvel exercice</div>
              <div style={{display:'flex',gap:8}}>
                <input ref={inputRef} style={{...S.inp,flex:1}} placeholder="ex: Fly Cable, Hip Thrust..."
                  value={exName} onChange={e=>setExName(e.target.value)}
                  onKeyDown={e=>e.key==='Enter'&&addExercise(exName)}/>
                <button onClick={()=>addExercise(exName)} style={{...S.btnG,color:'#e8f94a',borderColor:'#e8f94a',padding:'8px 16px'}}>OK</button>
                <button onClick={()=>setShowPicker(false)} style={S.btnG}>✕</button>
              </div>
            </div>
          )}
        </div>
        {toast && <div style={S.toastBx}>{toast}</div>}
      </div>
    );
  }

  // ── STATS ──────────────────────────────────────────────────────────────────
  if (view==='stats') {
    const exN = selEx || allExercises[0];
    const data = exN ? buildChart(exN) : [];
    const lastPt = data[data.length-1], firstPt = data[0];
    const prog = lastPt && firstPt && data.length>1 ? Math.round((lastPt[metric]-firstPt[metric])*10)/10 : null;
    const mets = [['maxWeight','Poids max'],['e1rm','1RM estimé'],['volume','Volume']];
    return (
      <div style={S.app}>
        <div style={S.hdr}><div><div style={S.logo}>Progression</div><div style={S.sub}>Graphiques de force</div></div></div>
        <div style={S.sec}>
          {allExercises.length===0 ? (
            <div style={{textAlign:'center',padding:'60px 0',color:'#333'}}>
              <div style={{fontSize:40,marginBottom:12}}>📈</div>
              <div style={{fontSize:16,fontWeight:600,textTransform:'uppercase'}}>Lance ta première séance !</div>
            </div>
          ) : (
            <>
              <div style={{marginBottom:16}}>
                <div style={{fontSize:11,color:'#555',letterSpacing:'0.15em',textTransform:'uppercase',marginBottom:8}}>Exercice</div>
                <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                  {allExercises.map(n=>(
                    <button key={n} onClick={()=>setSelEx(n)}
                      style={{background:exN===n?'#e8f94a':'#1a1a1a',color:exN===n?'#0a0a0a':'#888',border:`1px solid ${exN===n?'#e8f94a':'#2a2a2a'}`,borderRadius:4,padding:'7px 12px',fontSize:13,cursor:'pointer',fontWeight:exN===n?700:400}}>
                      {n}
                    </button>
                  ))}
                </div>
              </div>
              <div style={{display:'flex',gap:6,marginBottom:18}}>
                {mets.map(([k,l])=>(
                  <button key={k} onClick={()=>setMetric(k)}
                    style={{flex:1,background:metric===k?'#1a2000':'transparent',color:metric===k?'#e8f94a':'#555',border:`1px solid ${metric===k?'#2a3a00':'#1e1e1e'}`,borderRadius:4,padding:'8px 4px',fontSize:12,cursor:'pointer',fontWeight:700,textTransform:'uppercase'}}>
                    {l}
                  </button>
                ))}
              </div>
              {exN && allPRs[exN]>0 && (
                <div style={{background:'#2a1500',border:'1px solid #ff8800',borderRadius:6,padding:'12px 16px',marginBottom:14,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontSize:13,color:'#888',textTransform:'uppercase',letterSpacing:'0.1em',fontWeight:700}}>🏆 Record personnel</span>
                  <span style={{fontSize:24,fontWeight:800,color:'#ffaa00'}}>{allPRs[exN]} kg</span>
                </div>
              )}
              {data.length<2 ? (
                <div style={{...S.card,padding:'30px 20px',textAlign:'center',color:'#444',fontSize:14}}>Besoin de 2+ séances avec cet exercice.</div>
              ) : (
                <>
                  {prog!==null && (
                    <div style={{display:'flex',gap:10,marginBottom:14}}>
                      <div style={{flex:1,background:'#111',border:'1px solid #1e1e1e',borderRadius:6,padding:'14px 16px'}}>
                        <div style={{fontSize:11,color:'#555',letterSpacing:'0.12em',textTransform:'uppercase',marginBottom:4}}>Progression</div>
                        <div style={{fontSize:30,fontWeight:800,color:prog>=0?'#e8f94a':'#f94a4a'}}>{prog>=0?'+':''}{prog} kg</div>
                      </div>
                      <div style={{flex:1,background:'#111',border:'1px solid #1e1e1e',borderRadius:6,padding:'14px 16px'}}>
                        <div style={{fontSize:11,color:'#555',letterSpacing:'0.12em',textTransform:'uppercase',marginBottom:4}}>Dernière valeur</div>
                        <div style={{fontSize:30,fontWeight:800}}>{lastPt[metric]} <span style={{fontSize:14,color:'#555'}}>kg</span></div>
                      </div>
                    </div>
                  )}
                  <div style={{...S.card,padding:'16px 8px 8px'}}>
                    <div style={{fontSize:11,color:'#555',letterSpacing:'0.15em',textTransform:'uppercase',marginBottom:8,paddingLeft:10}}>
                      {mets.find(([k])=>k===metric)?.[1]} (kg)
                    </div>
                    <SVGLineChart data={data} dataKey={metric} height={180}/>
                  </div>
                  <div style={{...S.card,padding:'16px 8px 8px'}}>
                    <div style={{fontSize:11,color:'#555',letterSpacing:'0.15em',textTransform:'uppercase',marginBottom:8,paddingLeft:10}}>Volume par séance (kg)</div>
                    <SVGBarChart data={data} dataKey="volume" height={140}/>
                  </div>
                  <div style={{fontSize:11,color:'#444',letterSpacing:'0.15em',textTransform:'uppercase',margin:'16px 0 8px'}}>Détail</div>
                  {[...data].reverse().map((pt,i)=>(
                    <div key={i} style={{...S.card,display:'flex',justifyContent:'space-between',alignItems:'center',padding:'11px 16px'}}>
                      <span style={{fontSize:14,color:'#888'}}>{pt.date}</span>
                      <div style={{display:'flex',gap:16}}>
                        <span style={{fontSize:13,color:'#555'}}>Max <b style={{color:pt.maxWeight===allPRs[exN]?'#ffaa00':'#f0ede8'}}>{pt.maxWeight}kg{pt.maxWeight===allPRs[exN]?' 🏆':''}</b></span>
                        <span style={{fontSize:13,color:'#555'}}>Vol <b style={{color:'#f0ede8'}}>{pt.volume}kg</b></span>
                      </div>
                    </div>
                  ))}
                </>
              )}
            </>
          )}
        </div>
        {toast && <div style={S.toastBx}>{toast}</div>}
        <NavBar current="stats" setView={setView}/>
      </div>
    );
  }

  // ── HOME ───────────────────────────────────────────────────────────────────
  if (view==='home') {
    const { status } = computeFatigue(sessions, customExercises);
    const fatiguedCount = Object.values(status).filter(s=>s==='fatigue').length;
    const okCount       = Object.values(status).filter(s=>s==='ok').length;
    return (
      <div style={S.app}>
        <div style={S.hdr}>
          <div><div style={S.logo}>IronLog</div><div style={S.sub}>Ton coach de progression</div></div>
          <div style={{fontSize:13,color:'#444'}}>{new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}</div>
        </div>
        <div style={S.sec}>
          {/* Fatigue summary card */}
          {sessions.length > 0 && (
            <div onClick={()=>setView('corps')} style={{...S.card,borderColor:'#1a2a1a',cursor:'pointer',marginBottom:16}}>
              <div style={{padding:'14px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontSize:13,color:'#555',textTransform:'uppercase',letterSpacing:'0.1em',fontWeight:700,marginBottom:6}}>💪 État musculaire du jour</div>
                  <div style={{display:'flex',gap:10}}>
                    <span style={{fontSize:13,color:'#4af97a'}}>🟢 {okCount} récupérés</span>
                    <span style={{fontSize:13,color:'#f94a4a'}}>🔴 {fatiguedCount} fatigués</span>
                  </div>
                </div>
                <span style={{color:'#444',fontSize:20}}>→</span>
              </div>
            </div>
          )}

          {allExercises.length>0 && (
            <div style={{marginBottom:20}}>
              <div style={{fontSize:11,color:'#444',letterSpacing:'0.15em',textTransform:'uppercase',marginBottom:10}}>🏆 Records personnels</div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {allExercises.filter(n=>allPRs[n]>0).map(n=>(
                  <div key={n} style={{background:'#1a1000',border:'1px solid #2a2000',borderRadius:6,padding:'10px 14px'}}>
                    <div style={{fontSize:11,color:'#555',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:4}}>{n}</div>
                    <div style={{fontSize:20,fontWeight:800,color:'#ffaa00'}}>{allPRs[n]} kg</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {sessions.length>0 && (
            <>
              <div style={{fontSize:11,color:'#444',letterSpacing:'0.15em',textTransform:'uppercase',marginBottom:14}}>Dernière séance</div>
              {sessions.slice(0,1).map(s=>(
                <div key={s.id} style={{...S.card,borderColor:'#252500'}}>
                  <div style={{padding:'12px 16px',background:'#0e0e00',borderBottom:'1px solid #252500',fontSize:13,color:'#888',letterSpacing:'0.1em',textTransform:'uppercase'}}>
                    📅 {fmtL(s.date)} — {s.exercises.length} exercice{s.exercises.length>1?'s':''}
                  </div>
                  {s.exercises.map((ex,i)=>(
                    <div key={i} style={{padding:'10px 16px',borderBottom:'1px solid #1a1a1a'}}>
                      <div style={{fontSize:15,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:4}}>{ex.name}</div>
                      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                        {ex.sets.map((set,si)=><span key={si} style={S.tag}>{set.weight}kg×{set.reps}</span>)}
                      </div>
                    </div>
                  ))}
                </div>
              ))}
            </>
          )}

          <button style={S.btn} onClick={startSession}>+ Nouvelle Séance</button>
          {sessions.length>0 && <button style={S.btnO} onClick={()=>setView('stats')}>📈 Voir mes graphiques</button>}
        </div>
        {toast && <div style={S.toastBx}>{toast}</div>}
        <NavBar current="home" setView={setView}/>
      </div>
    );
  }

  // ── HISTORY ────────────────────────────────────────────────────────────────
  return (
    <div style={S.app}>
      <div style={S.hdr}>
        <div><div style={S.logo}>Historique</div><div style={S.sub}>{sessions.length} séance{sessions.length!==1?'s':''}</div></div>
        <button onClick={generatePDF}
          style={{background:'#1a2000',border:'1px solid #2a3a00',borderRadius:6,color:'#e8f94a',fontFamily:'inherit',fontWeight:700,fontSize:12,padding:'8px 14px',cursor:'pointer',letterSpacing:'0.08em',textTransform:'uppercase'}}>
          📄 PDF semaine
        </button>
      </div>
      <div style={S.sec}>
        {sessions.length===0 ? (
          <div style={{textAlign:'center',padding:'40px 0',color:'#333',fontSize:15}}>Aucune séance encore.</div>
        ) : sessions.map(s=>(
          <div key={s.id} style={S.card}>
            <div style={{padding:'10px 16px',background:'#111',borderBottom:'1px solid #1e1e1e',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:15,fontWeight:700,textTransform:'uppercase',color:'#e8f94a'}}>{fmtL(s.date)}</span>
              <div style={{display:'flex',gap:8}}>
                <button onClick={()=>editSession(s)} style={{...S.btnG,color:'#e8f94a',borderColor:'#2a3a00',padding:'5px 12px',fontSize:12,fontWeight:700}}>✏️ Modifier</button>
                <button onClick={()=>setConfirmDel(confirmDel===s.id?null:s.id)} style={{...S.btnG,color:'#f94a4a',borderColor:'#3a1a1a',padding:'5px 12px',fontSize:12,fontWeight:700}}>🗑️</button>
              </div>
            </div>
            {confirmDel===s.id && (
              <div style={{background:'#1a0a0a',borderBottom:'1px solid #3a1a1a',padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:13,color:'#f94a4a',fontWeight:700}}>Supprimer cette séance ?</span>
                <div style={{display:'flex',gap:8}}>
                  <button onClick={()=>deleteSession(s.id)} style={{background:'#f94a4a',border:'none',borderRadius:4,color:'#fff',fontFamily:'inherit',fontWeight:700,fontSize:13,padding:'6px 14px',cursor:'pointer'}}>OUI</button>
                  <button onClick={()=>setConfirmDel(null)} style={S.btnG}>Annuler</button>
                </div>
              </div>
            )}
            {s.exercises.map((ex,i)=>{
              const isPRSes = ex.sets.length>0 && maxW(ex)===allPRs[ex.name] && allPRs[ex.name]>0;
              return (
                <div key={i} style={{padding:'10px 16px',borderBottom:'1px solid #161616'}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                    <div style={{fontSize:14,fontWeight:700,textTransform:'uppercase'}}>{ex.name}</div>
                    {isPRSes && <span style={S.prTag}>🏆 PR</span>}
                  </div>
                  <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                    {ex.sets.map((set,si)=><span key={si} style={S.tag}>{set.weight}kg×{set.reps}</span>)}
                  </div>
                </div>
              );
            })}
          </div>
        ))}
      </div>
      {toast && <div style={S.toastBx}>{toast}</div>}
      <NavBar current="history" setView={setView}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
  }
</script>
</body>
</html>
